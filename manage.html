<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .warning {
            margin: 25px 0;
            color: #9ca3af;
            line-height: 1.6;
            font-size: 1rem;
        }

        .reset-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.15rem;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            background: #dc2626;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .reset-btn:hover {
            background: #ef4444;
            transform: translateY(-2px);
        }

        .reset-btn:active {
            transform: translateY(0);
        }

        #msg {
            margin-top: 24px;
            color: #9ca3af;
            min-height: 24px;
        }

        .lock {
            font-size: 3rem;
            margin-bottom: 15px;
        }
    </style>

</head>

<body>

<div class="card">

    <div class="lock">🔒</div>

    <h1>Administrator</h1>

    <p class="warning">
        This page can permanently reset your streak.
        <br><br>
        Press the button below only if you want the timer to begin again from the current time.
    </p>

    <button class="reset-btn" onclick="resetStreak()">
        Reset Streak
    </button>

    <p id="msg"></p>

</div>

<script src="admin.js"></script>

</body>
</html>
